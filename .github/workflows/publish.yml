name: Publish to npm

# Policy:
#   - The PR version-bump guard lives in ci.yml (the CI gate), which requires
#     a package.json version bump whenever src/, package.json, or
#     package-lock.json changes.
#   - On push to main with package.json changed: naively publish.
#     If the version is already on npm, npm publish exits non-zero —
#     that's a bug the PR guard should have prevented.

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

# Trusted publishing (OIDC) — no static NPM_TOKEN needed.
permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish @getdial/cli
        run: npm publish --access public
