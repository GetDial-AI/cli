name: Publish to npm

# Policy:
#   - Any PR that touches src/** or package.json must also bump
#     package.json's `version` field. The PR check fails otherwise.
#   - On push to main with package.json changed: naively publish.
#     If the version is already on npm, npm publish exits non-zero ŌĆö
#     that's a bug the PR guard should have prevented.

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  pull_request:
    branches: [main]

# Trusted publishing (OIDC) ŌĆö no static NPM_TOKEN needed.
permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-bump-required:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Require version bump when source changes
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '^(src/|package\.json$)' || true)
          if [ -z "$CHANGED" ]; then
            echo "No src or package.json changes ŌĆö version bump not required."
            echo "## Version bump not required" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "This PR doesn't touch \`src/**\` or \`package.json\`." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          BASE_VERSION=$(git show "$BASE_SHA:package.json" | node -e 'const j=JSON.parse(require("fs").readFileSync(0,"utf8")); console.log(j.version)')
          HEAD_VERSION=$(node -p "require('./package.json').version")

          echo "base version: $BASE_VERSION"
          echo "head version: $HEAD_VERSION"
          echo "changed files:"
          echo "$CHANGED" | sed 's/^/  - /'

          if [ "$BASE_VERSION" = "$HEAD_VERSION" ]; then
            {
              echo "## Version bump required"
              echo ""
              echo "This PR changes files under \`src/\` or \`package.json\` but doesn't bump \`package.json\` version (still \`$HEAD_VERSION\`)."
              echo ""
              echo "Bump \`package.json\` version before merging."
              echo ""
              echo "**Changed files:**"
              echo ""
              echo '```'
              echo "$CHANGED"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::package.json version unchanged ($HEAD_VERSION) despite src or package.json changes. Bump the version."
            exit 1
          fi

          {
            echo "## Version bump OK"
            echo ""
            echo "\`$BASE_VERSION\` ŌåÆ \`$HEAD_VERSION\`. Merging will publish \`@getdial/cli@$HEAD_VERSION\`."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Version bumped: $BASE_VERSION ŌåÆ $HEAD_VERSION."

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish @getdial/cli
        run: npm publish --access public
